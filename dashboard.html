                                    <svg width="16" height="12" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">

                                    <svg width="16" height="12" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">

                        <!----Buttons----->
                    <div class="flex justify-between mt-[50%]">
                        <button id="cancelCreateBtn" class="bg-secondary p-4 cursor-pointer hover:bg-secondary-light text-[18px] text-primary hover:text-tertiary rounded-md hover:scale-105 transition-all ease-in-out duration-400">Cancel</button>
                        <button id="saveCreateBtn" class="bg-primary cursor-pointer hover:bg-primary/20 p-4 text-[18px] text-tertiary rounded-md hover:scale-105 transition-all ease-in-out duration-400">Create Category</button>            
                    </div>
                        
                    </div>
                    
                </div>

                <!------------Calender  Popup---------------->                              
                <div id="date-time-open" class="hidden flex inset-0 bg-secondary/30 backdrop-blur-sm  items-center justify-center p-4 z-50">
                    <div class="bg-secondary-light w-full max-w-md p-5 items-center justify-center  relative rounded-sm shadow-lg max-h-[90vh] overflow-y-auto">    

                            <!-----Arrows for Direction---->
                            <!---Next--->
                            <div class="absolute left-5 top-10">
                                <img src="/imagess/calender/arrow-prev.png" id="prevMonth" class="hover:scale-150 transition-all ease-in-out duration-300 cursor-pointer " alt="">
                            </div> 
                            <!----Previous---->
                            <div class="absolute right-5 top-10">
                                <img src="/imagess/calender/arrow-next.png" id="nextMonth" class="hover:scale-150 transition-all ease-in-out duration-300 cursor-pointer " alt="">
                            </div>
                                                       
                        <!---Calender Container---->
                        <div class="flex flex-col justify-center items-center">
                            <!----Month--->
                        <div id="monthDisplay" class="text-[24px] text-tertiary font-light"></div>
                        <!----Year--->
                        <div id="yearDisplay" class="text-[13px] text-tertiary font-light"></div>

                        <!----Border Line---->
                        <div class="w-full h-[1px] bg-tertiary-gray my-3"></div>

                        <!---Days of the week--->
                         <div class="grid grid-cols-7 gap-3">
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-[#FF4949] font-semibold">Sun</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-tertiary font-semibold">Mon</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-tertiary font-semibold">Tue</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-tertiary font-semibold">Wed</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-tertiary font-semibold">Thu</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-tertiary font-semibold">Fri</div>
                            <div class="flex justify-center item-center px-5 py-2 rounded-md text-[18px] text-[#FF4949] font-semibold">Sat</div>  
                        </div>
                        <!----Days of Month---->
                        <div id="daysContainer" class="mt-2 grid grid-cols-7 gap-3"></div>
                        <!----button---->
                        <div class="w-full flex gap-2 mt-6">
                            <button id="calenderCloseBtn" class="w-1/2 text-[18px] text-primary bg-secondary-light py-3 px-5 rounded-md hover:bg-secondary hover:text-tertiary transition-all ease-in-out duration-300 cursor-pointer  font-normal">Cancel</button>
                             <button id="chooseTimeBtn" class="w-1/2 text-[18px] text-tertiary bg-primary py-3 px-5 rounded-md hover:bg-primary/20 transition-all ease-in-out duration-300 cursor-pointer font-normal">Choose Time</button>
                        </div>
                        </div>
                </div>
                </div>

                <!---------Time Pop-UP------->
                <div id="timeBtn" class="hidden flex inset-0 bg-secondary/30 backdrop-blur-sm  items-center justify-center p-4 z-50">
                <div class="bg-secondary-light w-full max-w-md p-5 items-center justify-center  relative rounded-sm shadow-lg max-h-[90vh] overflow-y-auto">

                    <!-----Title----->      
                    <div class="text-[24px] text-tertiary font-light text-center">Choose Time</div> 

                    <!----Border Line---->
                    <div class="w-full h-[1px] bg-tertiary-gray my-3"></div>

                    <!----Time UI----->
                    <div id="timeOutPut" class="flex mt-6 justify-center space-x-4 items-center cursor-pointer">

                        <!------HOUR----->
                        <div id="hours" class="flex-1 flex flex-col gap-1  justify-center items-center px-2 py-4 text-tertiary bg-secondary rounded-md">
                           
                           <div id="hourDisplay" class="text-[26px] font-bold"></div>
                           
                           <!--Button--->
                            <div id="hourBtn" class="flex flex-col w-full hidden">
                            
                                <button id="increase" class="text-[12px] font-bold cursor-pointer">▲</button>
                                <button id="decrease" class="text-[12px] font-bold cursor-pointer">▼</button>

                                <button id="saveHourBtn" class="w-full mt-1  text-center text-[12px] text-tertiary font-medium py-1 px-2 bg-secondary-light rounded-sm cursor-pointer">Save</button>
                            </div>
                        </div>

                        <!-----DOT------>
                        <div class="text-tertiary  text-[26px] font-minium">:</div>

                        <!------MINUTES------>
                        <div id="minutes" class="flex-1 flex flex-col justify-center items-center px-2 py-4 text-tertiary bg-secondary rounded-md text-[24px] font-bold">

                           <div id="minuteDisplay" class="text-[26px] font-bold"></div>
                           
                           <!--Button--->
                            <div id="minuteBtn" class="flex flex-col w-full hidden">
                            
                                <button id="increaseMin" class="text-[12px] font-bold cursor-pointer">▲</button>
                                <button id="decreaseMin" class="text-[12px] font-bold cursor-pointer">▼</button>

                                <button id="saveMinBtn" class="w-full mt-1  text-center text-[12px] text-tertiary font-medium py-1 px-2 bg-secondary-light rounded-sm cursor-pointer">Save</button>
                            </div>
                        </div>

                        <!-----Period---->
                        <div class="flex-1 flex flex-col justify-center items-center px-2 py-4 text-tertiary bg-secondary rounded-md text-[24px] font-bold ml-2">
                            <div id="periodDisplay" class="text-[26px] font-bold"></div>
                        </div>
                    </div>
                

                    <!-----Button----->
                    <div class="w-full flex gap-2 mt-6">
                            <button id="timeCloseBtn" class="w-1/2 text-[18px] text-primary bg-secondary-light py-3 px-5 rounded-md hover:bg-secondary hover:text-tertiary transition-all ease-in-out duration-300 cursor-pointer font-normal">Back</button>
                             <button id="saveDateTimeBtn" class="w-1/2 text-[18px] text-tertiary bg-primary py-3 px-5 rounded-md hover:bg-primary/20 transition-all ease-in-out duration-300 cursor-pointer  font-normal">Save</button>
                    </div>
                </div>
                </div>
